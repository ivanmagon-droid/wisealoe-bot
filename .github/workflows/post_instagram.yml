name: Post to Instagram

on:
  schedule:
    - cron: '0 8 * * *'  # Ogni giorno alle 09:00 ora italiana (CET=UTC+1)
  workflow_dispatch:      # Trigger manuale dalla dashboard GitHub

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Post to Instagram
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
        run: python scripts/post_to_instagram.py

      - name: Commit updated queue
        run: |
          git config --local user.email "bot@wisealoe.com"
          git config --local user.name "WiseAloe Bot"
          git add content/queue.json
          git diff --staged --quiet || git commit -m "chore: mark post as published [skip ci]"
          git push
